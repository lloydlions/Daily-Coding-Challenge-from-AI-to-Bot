name: Daily Coding Challenge Bot

on:
  schedule:
    - cron: "0 0 * * 1-6" # Monday-Saturday at 8:00 AM Asia/Manila
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-challenge-bot:
    runs-on: ubuntu-latest
    env:
      TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Execute Bot Generation
        run: PYTHONPATH=. python src/main.py

      - name: Commit Topic History
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/topic_history.json
          if git diff --cached --quiet; then
            echo "No topic history changes"
          else
            git commit -m "Update topic history"
            git push
          fi
