timezone: "Asia/Manila"

weekly_schedule:
  monday: "python"
  tuesday: "python"
  wednesday: "python"
  thursday: "python"
  friday: "python"
  saturday: "python"
  sunday: null

tracks:
  - key: "python"
    name: "Python"
    language: "Python"
    difficulty: "foundational"
    test_framework: "pytest"
    setup_cmd: "python -m pytest"
    context: "Assume programming experience in Java or JavaScript and basic comfort with functions, if/else, match, and loops. Focus on getting comfortable coding Python through collections, data-shape transformations, standard-library helpers, and idioms similar to map/filter/sort/stream operations. Use varied realistic mini-scenarios, not one repeated domain, and avoid toy beginner drills."

  - key: "java_core"
    name: "Java Core"
    language: "Java"
    difficulty: "easy"
    test_framework: "JUnit 5"
    setup_cmd: "mvn test"
    context: "Focus on Java 17+, clean object-oriented design, standard collections, and readable unit-testable code."

  - key: "quarkus"
    name: "Quarkus"
    language: "Java"
    difficulty: "easy"
    test_framework: "JUnit 5 with QuarkusTest"
    setup_cmd: "mvn test"
    context: "Focus on Quarkus REST APIs, dependency injection, DTOs, validation, configuration, and small backend services."

  - key: "sql"
    name: "SQL"
    language: "SQL"
    difficulty: "easy"
    test_framework: "SQLite"
    setup_cmd: "sqlite3 challenge.db"
    context: "Focus on practical querying, clean schema examples, joins, aggregation, and reporting-style questions."

  - key: "python_data"
    name: "Python Data Basics"
    language: "Python"
    difficulty: "easy"
    test_framework: "pytest"
    setup_cmd: "python -m pytest"
    context: "Assume beginner data knowledge. Focus on Python, pandas basics, CSV/JSON handling, cleaning, and small ETL workflows."

  - key: "ai_api"
    name: "AI/API Mini Task"
    language: "Python"
    difficulty: "easy"
    test_framework: "pytest"
    setup_cmd: "python -m pytest"
    context: "Focus on small AI/API integration tasks, structured inputs and outputs, validation, retries, and token-conscious design."

  - key: "review"
    name: "Review / Mixed Practice"
    language: "Java"
    difficulty: "easy"
    test_framework: "JUnit 5"
    setup_cmd: "mvn test"
    context: "Focus on reviewing, refactoring, edge cases, readability, and strengthening previous concepts."
